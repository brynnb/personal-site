<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chex Quest.exe</title>
  <style>
    html,
    body,
    #game-shell {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #c0c0c0;
      font-family: "MS Sans Serif", Tahoma, sans-serif;
      font-size: 12px;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    .boot {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      text-align: center;
      background: #000;
    }

    .boot-title {
      color: #fff;
      font-weight: bold;
      letter-spacing: 0;
    }

    .boot-detail {
      max-width: 420px;
      line-height: 1.35;
      color: #c0c0c0;
    }

    .boot-button {
      font: inherit;
      color: #000;
      background: #c0c0c0;
      border: 0;
      padding: 4px 12px;
      cursor: pointer;
      box-shadow:
        inset 1px 1px #fff,
        inset -1px -1px #808080;
    }

    .boot-button:active {
      box-shadow:
        inset 1px 1px #808080,
        inset -1px -1px #fff;
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <div class="boot">
      <div class="boot-title">Loading Chex Quest...</div>
    </div>
  </div>

  <script>
    (function () {
      var DATA_PATH = 'https://cdn.emulatorjs.org/stable/data/';
      var shell = document.getElementById('game-shell');
      var query = new URLSearchParams(window.location.search);
      var gameUrl = query.get('wad') || 'CHEXQUEST.WAD';

      function setBoot(title, detail, actionLabel, action) {
        var button = actionLabel
          ? '<button class="boot-button" type="button" id="boot-action">' + actionLabel + '</button>'
          : '';

        shell.innerHTML =
          '<div class="boot">' +
            '<div class="boot-title">' + title + '</div>' +
            (detail ? '<div class="boot-detail">' + detail + '</div>' : '') +
            button +
          '</div>';

        var actionButton = document.getElementById('boot-action');
        if (actionButton && action) {
          actionButton.addEventListener('click', action);
        }
      }

      function createGameMount() {
        shell.innerHTML = '<div id="game"></div>';
      }

      function loadEmulator(gameUrl) {
        createGameMount();

        window.EJS_player = '#game';
        window.EJS_core = 'prboom';
        window.EJS_gameUrl = gameUrl;
        window.EJS_gameName = 'Chex Quest';
        window.EJS_pathtodata = DATA_PATH;
        window.EJS_startOnLoaded = true;
        window.EJS_fullscreenOnLoaded = false;
        window.EJS_disableAutoLang = true;
        window.EJS_color = '#c0c0c0';
        window.EJS_backgroundColor = '#000';

        var loader = document.createElement('script');
        loader.src = DATA_PATH + 'loader.js';
        loader.onerror = function () {
          setBoot(
            'Emulator failed to load',
            'The Chex Quest window could not load EmulatorJS from the configured data path.',
            'Try Again',
            function () {
              window.location.reload();
            }
          );
        };
        document.body.appendChild(loader);
      }

      loadEmulator(gameUrl);
    })();
  </script>
</body>
</html>
